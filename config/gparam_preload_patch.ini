# Place this file next to gparam_preload_patch.dll.
enabled=true
log_enabled=false

# Comma or whitespace separated CommonEvent GPARAM ids.
# The DLL requests gparam:/m00_00_XXXX_CommonEvent.gparam for each id.
common_event_ids=5,6,7,8,21,25

# Delay before starting registration attempts.
start_delay_ms=5000

# Retry settings. Attempts run from the DrawParamUpdate task.
retries_per_id=120
retry_every_frames=60

# Keep both enabled for normal use.
request_filecap=true
prime_drawparam=true
